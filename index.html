<!DOCTYPE html>
<html>
<head>
    <title>Analytics Demo</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R8ZWYCL67X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-R8ZWYCL67X');
    </script>

</head>

<body>

    <h1>Welcome to the Demo Website</h1>
    <p>This page is used for Google Analytics tracking.</p>

    <button onclick="trackClick()">Click Me</button>

    <script>
        function trackClick() {
            alert("Button clicked");

            gtag('event', 'button_click', {
                'event_category': 'engagement',
                'event_label': 'demo_button'
            });
        }
    </script>

</body>
</html>
